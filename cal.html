<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page: #f1ecfa;
    --case: #ffffff;
    --case-edge: #f6f1fc;
    --screen-bg: #3b2560;
    --screen-text: #ffffff;
    --screen-sub: #c3aee6;
    --key-num: #f4eefc;
    --key-num-text: #3b2560;
    --key-func: #e4d4fa;
    --key-func-text: #3b2560;
    --key-op: #9b5de5;
    --key-op-text: #ffffff;
    --key-eq: #c86dd7;
    --key-eq-text: #ffffff;
    --shadow-deep: rgba(91,45,150,0.22);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-page);
    font-family: 'Manrope', system-ui, sans-serif;
    padding: 20px;
  }

  .calculator {
    width: min(360px, 94vw);
    background: linear-gradient(160deg, var(--case), var(--case-edge));
    border-radius: 26px;
    padding: 20px 18px 24px;
    box-shadow:
      0 24px 50px var(--shadow-deep),
      inset 0 1px 0 rgba(255,255,255,0.6);
  }

  .brand {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2px 6px 12px;
    color: #8a90a3;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .brand span:last-child { color: var(--key-op); }

  .screen {
    background: var(--screen-bg);
    border-radius: 16px;
    padding: 18px 18px 14px;
    margin-bottom: 18px;
    min-height: 96px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.35);
  }

  .screen-history {
    font-family: 'Roboto Mono', monospace;
    font-size: 13px;
    color: var(--screen-sub);
    text-align: right;
    min-height: 16px;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow-x: auto;
  }

  .screen-expression {
    font-family: 'Roboto Mono', monospace;
    font-weight: 700;
    font-size: 38px;
    line-height: 1.1;
    color: var(--screen-text);
    text-align: right;
    word-break: break-all;
  }

  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    border: none;
    border-radius: 14px;
    font-family: 'Manrope', system-ui, sans-serif;
    font-size: 18px;
    font-weight: 700;
    padding: 16px 0;
    cursor: pointer;
    color: var(--key-num-text);
    background: var(--key-num);
    box-shadow: 0 2px 0 rgba(43,48,64,0.08);
    transition: transform 0.06s ease, box-shadow 0.06s ease, filter 0.15s ease;
  }

  button:active {
    transform: translateY(2px);
    box-shadow: 0 0 0 rgba(43,48,64,0.08);
  }

  button:hover { filter: brightness(0.97); }

  .key-func {
    background: var(--key-func);
    color: var(--key-func-text);
  }

  .key-op {
    background: var(--key-op);
    color: var(--key-op-text);
    font-size: 20px;
  }

  .key-eq {
    background: var(--key-eq);
    color: var(--key-eq-text);
    grid-row: span 2;
    font-size: 22px;
  }

  .key-zero { grid-column: span 2; }

  @media (max-width: 420px) {
    .calculator { padding: 16px 12px 20px; border-radius: 20px; }
    .screen-expression { font-size: 32px; }
    button { padding: 17px 0; font-size: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    button { transition: none; }
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="brand"><span>Calculator</span><span>basic</span></div>

  <div class="screen">
    <div class="screen-history" id="history">&nbsp;</div>
    <div class="screen-expression" id="expression">0</div>
  </div>

  <div class="keys">
    <button class="key-func" data-action="clear">AC</button>
    <button class="key-func" data-action="negate">±</button>
    <button class="key-func" data-action="percent">%</button>
    <button class="key-op" data-action="operator" data-value="÷">÷</button>

    <button data-action="number" data-value="7">7</button>
    <button data-action="number" data-value="8">8</button>
    <button data-action="number" data-value="9">9</button>
    <button class="key-op" data-action="operator" data-value="×">×</button>

    <button data-action="number" data-value="4">4</button>
    <button data-action="number" data-value="5">5</button>
    <button data-action="number" data-value="6">6</button>
    <button class="key-op" data-action="operator" data-value="−">−</button>

    <button data-action="number" data-value="1">1</button>
    <button data-action="number" data-value="2">2</button>
    <button data-action="number" data-value="3">3</button>
    <button class="key-op" data-action="operator" data-value="+">+</button>

    <button class="key-zero" data-action="number" data-value="0">0</button>
    <button data-action="decimal">.</button>
    <button class="key-eq" data-action="equals">=</button>
  </div>
</div>

<script>
(function () {
  const historyEl = document.getElementById('history');
  const expressionEl = document.getElementById('expression');

  // Calculator state
  let currentValue = '0';
  let previousValue = null;
  let pendingOperator = null;
  let justEvaluated = false;
  let lastCompleted = ''; // shown in the small history line after "="

  const MAX_DIGITS = 12;

  function updateScreen() {
    // Main line shows the full expression being typed: "prev op current"
    if (pendingOperator !== null && previousValue !== null) {
      expressionEl.textContent = `${formatForDisplay(previousValue)} ${pendingOperator} ${formatForDisplay(currentValue)}`;
    } else {
      expressionEl.textContent = formatForDisplay(currentValue);
    }
    historyEl.textContent = lastCompleted || '\u00A0';
  }

  function formatForDisplay(value) {
    if (typeof value === 'number') {
      if (!isFinite(value)) return 'Error';
      let str = value.toString();
      if (str.length > MAX_DIGITS) {
        str = value.toPrecision(10).toString();
      }
      return str;
    }
    return value;
  }

  function inputDigit(digit) {
    if (justEvaluated) {
      currentValue = digit;
      previousValue = null;
      pendingOperator = null;
      justEvaluated = false;
      return;
    }
    if (currentValue === '0') {
      currentValue = digit;
    } else if (currentValue.replace('-', '').replace('.', '').length < MAX_DIGITS) {
      currentValue += digit;
    }
  }

  function inputDecimal() {
    if (justEvaluated) {
      currentValue = '0.';
      previousValue = null;
      pendingOperator = null;
      justEvaluated = false;
      return;
    }
    if (!currentValue.includes('.')) {
      currentValue += '.';
    }
  }

  function setOperator(op) {
    if (pendingOperator && previousValue !== null && !justEvaluated) {
      // Chain: evaluate what's pending first, keep it visible as the new "previous"
      const result = compute(parseFloat(previousValue), parseFloat(currentValue), pendingOperator);
      previousValue = result;
      currentValue = String(result);
    } else {
      previousValue = currentValue;
    }
    pendingOperator = op;
    justEvaluated = false;
    currentValue = '0';
  }

  function compute(a, b, operator) {
    let result = 0;
    // if-else chain picks the operation
    if (operator === '+') {
      result = a + b;
    } else if (operator === '−') {
      result = a - b;
    } else if (operator === '×') {
      result = a * b;
    } else if (operator === '÷') {
      result = b === 0 ? NaN : a / b;
    } else {
      result = b;
    }
    return Math.round(result * 1e10) / 1e10;
  }

  function equals() {
    if (pendingOperator === null || previousValue === null) return;
    const a = parseFloat(previousValue);
    const b = parseFloat(currentValue);
    const result = compute(a, b, pendingOperator);
    lastCompleted = `${formatForDisplay(a)} ${pendingOperator} ${formatForDisplay(b)} =`;
    currentValue = String(result);
    previousValue = null;
    pendingOperator = null;
    justEvaluated = true;
  }

  function clearAll() {
    currentValue = '0';
    previousValue = null;
    pendingOperator = null;
    justEvaluated = false;
    lastCompleted = '';
  }

  function negate() {
    if (currentValue === '0') return;
    currentValue = currentValue.startsWith('-')
      ? currentValue.slice(1)
      : '-' + currentValue;
  }

  function percent() {
    currentValue = String(parseFloat(currentValue) / 100);
  }

  function handleAction(action, value) {
    if (action === 'number') inputDigit(value);
    else if (action === 'decimal') inputDecimal();
    else if (action === 'operator') setOperator(value);
    else if (action === 'equals') equals();
    else if (action === 'clear') clearAll();
    else if (action === 'negate') negate();
    else if (action === 'percent') percent();
    updateScreen();
  }

  // Wire up every button, looping over the node list
  const buttons = document.querySelectorAll('button[data-action]');
  for (let i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function () {
      handleAction(this.dataset.action, this.dataset.value);
    });
  }

  // Keyboard support
  window.addEventListener('keydown', (e) => {
    const key = e.key;
    if (key >= '0' && key <= '9') handleAction('number', key);
    else if (key === '.') handleAction('decimal');
    else if (key === '+') handleAction('operator', '+');
    else if (key === '-') handleAction('operator', '−');
    else if (key === '*') handleAction('operator', '×');
    else if (key === '/') { e.preventDefault(); handleAction('operator', '÷'); }
    else if (key === 'Enter' || key === '=') handleAction('equals');
    else if (key === 'Backspace') {
      currentValue = currentValue.length > 1 ? currentValue.slice(0, -1) : '0';
      updateScreen();
    } else if (key === 'Escape') handleAction('clear');
  });

  updateScreen();
})();
</script>

</body>
</html>
